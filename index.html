    <script>
      (function() {
        try {
          var theme = localStorage.getItem('impulse_theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>

    <div id="root"></div>

  </body>
